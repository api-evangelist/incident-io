naftiko: 1.0.0-alpha2
info:
  label: Incident.io API — Alerts
  description: 'Incident.io API — Alerts. 3 operations. Lead operation: Create an alert event. Self-contained Naftiko capability
    covering one Incident Io business surface.'
  tags:
  - Incident Io
  - Alerts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INCIDENT_IO_API_KEY: INCIDENT_IO_API_KEY
capability:
  consumes:
  - type: http
    namespace: incident-io-alerts
    baseUri: https://api.incident.io/v2
    description: Incident.io API — Alerts business capability. Self-contained, no shared references.
    resources:
    - name: alert-events
      path: /alert-events
      operations:
      - name: createalertevent
        method: POST
        description: Create an alert event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: alerts
      path: /alerts
      operations:
      - name: listalerts
        method: GET
        description: List alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-id
      path: /alerts/{id}
      operations:
      - name: getalert
        method: GET
        description: Show a single alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.INCIDENT_IO_API_KEY}}'
  exposes:
  - type: rest
    namespace: incident-io-alerts-rest
    port: 8080
    description: REST adapter for Incident.io API — Alerts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/alert-events
      name: alert-events
      description: REST surface for alert-events.
      operations:
      - method: POST
        name: createalertevent
        description: Create an alert event
        call: incident-io-alerts.createalertevent
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/alerts
      name: alerts
      description: REST surface for alerts.
      operations:
      - method: GET
        name: listalerts
        description: List alerts
        call: incident-io-alerts.listalerts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/alerts/{id}
      name: alerts-id
      description: REST surface for alerts-id.
      operations:
      - method: GET
        name: getalert
        description: Show a single alert
        call: incident-io-alerts.getalert
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: incident-io-alerts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Incident.io API — Alerts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-alert-event
      description: Create an alert event
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: incident-io-alerts.createalertevent
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-alerts
      description: List alerts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: incident-io-alerts.listalerts
      outputParameters:
      - type: object
        mapping: $.
    - name: show-single-alert
      description: Show a single alert
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: incident-io-alerts.getalert
      outputParameters:
      - type: object
        mapping: $.
