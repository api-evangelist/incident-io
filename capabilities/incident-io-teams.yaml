naftiko: 1.0.0-alpha2
info:
  label: Incident.io API — Teams
  description: 'Incident.io API — Teams. 2 operations. Lead operation: Teams. Self-contained Naftiko capability covering one
    Incident Io business surface.'
  tags:
  - Incident Io
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INCIDENT_IO_API_KEY: INCIDENT_IO_API_KEY
capability:
  consumes:
  - type: http
    namespace: incident-io-teams
    baseUri: https://api.incident.io/v2
    description: Incident.io API — Teams business capability. Self-contained, no shared references.
    resources:
    - name: teams
      path: /teams
      operations:
      - name: listteams
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: teams-id
      path: /teams/{id}
      operations:
      - name: getteam
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.INCIDENT_IO_API_KEY}}'
  exposes:
  - type: rest
    namespace: incident-io-teams-rest
    port: 8080
    description: REST adapter for Incident.io API — Teams. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/teams
      name: teams
      description: REST surface for teams.
      operations:
      - method: GET
        name: listteams
        description: listteams
        call: incident-io-teams.listteams
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/teams/{id}
      name: teams-id
      description: REST surface for teams-id.
      operations:
      - method: GET
        name: getteam
        description: getteam
        call: incident-io-teams.getteam
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: incident-io-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for Incident.io API — Teams. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: listteams
      description: listteams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: incident-io-teams.listteams
      outputParameters:
      - type: object
        mapping: $.
    - name: getteam
      description: getteam
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: incident-io-teams.getteam
      outputParameters:
      - type: object
        mapping: $.
